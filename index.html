<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Mixer - 想いを描く空</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, deleteDoc, onSnapshot, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAnqztpW41Rx4aSKpJ_jIgt9biI1cUPKW4",
            authDomain: "oneskyproject-6111a.firebaseapp.com",
            projectId: "oneskyproject-6111a",
            storageBucket: "oneskyproject-6111a.firebasestorage.app",
            messagingSenderId: "604978120603",
            appId: "1:604978120603:web:9b6e965cd6c11972f6c33e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = firebaseConfig.projectId;

        // Expose Firebase to window for React
        window.fb = { auth, db, appId, signInAnonymously, onAuthStateChanged, collection, addDoc, serverTimestamp, onSnapshot, doc, deleteDoc };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; margin: 0; background: #fff; }
        .text-glow { filter: drop-shadow(0 1px 1.5px rgba(0,0,0,0.4)) drop-shadow(0 4px 8px rgba(0,0,0,0.3)); }
        .sky-bg { transition: background 2s ease-in-out; }
        @keyframes progress { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        .animate-progress { animation: progress 1.5s infinite linear; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        const { auth, db, appId, signInAnonymously, onAuthStateChanged, collection, addDoc, serverTimestamp, onSnapshot, doc, deleteDoc } = window.fb;

        // --- 設定項目 ---
        // 新しく提供されたGAS URLを反映
        const GAS_URL = "https://script.google.com/macros/s/AKfycbw-PMvRBWv8C21I6fRHUKm6cb_HJoAGxdwmgGslZTk33XZ-jJdMNggnle6OzQRzEUOi/exec"; 
        const ADMIN_PASSWORD = "sky1234";
        // ---------------

        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                Send: <><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></>,
                History: <><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></>,
                Trash2: <><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></>,
                Cloud: <path d="M17.5 19c2.5 0 4.5-2 4.5-4.5 0-2.3-1.7-4.1-3.9-4.5-1.1-3.6-4.5-6.1-8.5-6.1-3.3 0-6.1 2.1-7.1 5-1.7.3-3 1.8-3 3.5C0 14.8 2.2 17 5 17h12.5"/>,
                Loader2: <><path d="M21 12a9 9 0 1 1-6.219-8.56"/></>,
                X: <path d="M18 6 6 18M6 6l12 12"/>,
                Sparkles: <path d="m12 3 1.912 5.813a2 2 0 0 0 1.275 1.275L21 12l-5.813 1.912a2 2 0 0 0-1.275 1.275L12 21l-1.912-5.813a2 2 0 0 0-1.275-1.275L3 12l5.813-1.912a2 2 0 0 0 1.275-1.275L12 3Z"/>,
                Lock: <><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={`${className} ${name === 'Loader2' ? 'animate-spin' : ''}`}>
                    {icons[name]}
                </svg>
            );
        };

        const App = () => {
            const [inputText, setInputText] = useState('');
            const [history, setHistory] = useState([]);
            const [loading, setLoading] = useState(false);
            const [isHistoryOpen, setIsHistoryOpen] = useState(false);
            const [passwordModal, setPasswordModal] = useState({ isOpen: false, targetId: null, type: null });
            const [passwordInput, setPasswordInput] = useState('');
            const [passwordError, setPasswordError] = useState(false);
            const [user, setUser] = useState(null);

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        await signInAnonymously(auth);
                    } catch (error) {
                        console.error("Auth error:", error);
                    }
                };
                const unsubscribe = onAuthStateChanged(auth, (currUser) => setUser(currUser));
                initAuth();
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const historyCollection = collection(db, 'artifacts', appId, 'public', 'data', 'history');
                const unsubscribe = onSnapshot(historyCollection, (snapshot) => {
                    const items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    // 日時順（新しいものが最後）にソート
                    const sortedItems = items.sort((a, b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0));
                    setHistory(sortedItems);
                }, (err) => console.error("Firestore error:", err));
                return () => unsubscribe();
            }, [user]);

            const fetchColorViaGAS = async (word) => {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ word: word })
                });
                if (!response.ok) throw new Error('GAS request failed');
                return await response.json();
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!inputText.trim() || loading || !user) return;

                const words = inputText.trim().split(/[\s\u3000]+/).filter(w => w.length > 0);
                setLoading(true);
                setInputText('');
                
                for (const w of words) {
                    try {
                        const res = await fetchColorViaGAS(w);
                        const historyCollection = collection(db, 'artifacts', appId, 'public', 'data', 'history');
                        await addDoc(historyCollection, {
                            word: w,
                            color: res.hex,
                            createdAt: serverTimestamp(),
                            uid: user.uid
                        });
                    } catch (e) { 
                        console.error("Error processing color:", e);
                    }
                }
                setLoading(false);
            };

            const handleAuth = async () => {
                if (passwordInput === ADMIN_PASSWORD) {
                    try {
                        if (passwordModal.type === 'all') {
                            // 全削除処理（バッチ処理が望ましいがシンプルにループで実装）
                            const promises = history.map(item => deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'history', item.id)));
                            await Promise.all(promises);
                        } else {
                            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'history', passwordModal.targetId));
                        }
                        setPasswordModal({ isOpen: false, targetId: null, type: null });
                        setPasswordInput('');
                    } catch (err) { console.error("Delete error:", err); }
                } else {
                    setPasswordError(true);
                    setTimeout(() => setPasswordError(false), 2000);
                }
            };

            const skyStyle = useMemo(() => {
                const initialSky = 'linear-gradient(to bottom, #e0f2fe, #7dd3fc)';
                if (history.length === 0) return { background: initialSky };
                const colors = history.map(h => h.color);
                // 最新の色が一番上にくるように反転
                const gradientStops = [...colors].reverse().join(', ');
                return { background: `linear-gradient(to bottom, ${gradientStops}, #020617)` };
            }, [history]);

            return (
                <div className="fixed inset-0 flex flex-col overflow-hidden">
                    {/* 背景レイヤー */}
                    <div className="absolute inset-0 sky-bg" style={skyStyle}>
                        <div className="absolute inset-0 opacity-20 pointer-events-none bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] mix-blend-overlay"></div>
                    </div>

                    {/* ヘッダー */}
                    <header className="relative z-20 p-4 flex justify-between items-center bg-white/10 backdrop-blur-md border-b border-white/20">
                        <div className="flex items-center gap-2 text-white text-glow">
                            <Icon name="Cloud" size={24} />
                            <h1 className="text-lg font-bold tracking-wider">Sky Mixer</h1>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setIsHistoryOpen(true)} className="p-2 text-white hover:bg-white/10 rounded-full transition-colors" title="履歴を表示">
                                <Icon name="History" size={22} />
                            </button>
                            <button onClick={() => setPasswordModal({ isOpen: true, type: 'all' })} className="p-2 text-white/70 hover:bg-white/10 rounded-full transition-colors" title="すべてリセット">
                                <Icon name="Trash2" size={22} />
                            </button>
                        </div>
                    </header>

                    {/* メイン表示エリア */}
                    <main className="relative flex-1 flex flex-col items-center justify-center p-6 text-center">
                        {loading ? (
                            <div className="flex flex-col items-center gap-4 text-white text-glow">
                                <Icon name="Sparkles" className="animate-pulse" />
                                <span className="text-xl font-medium">空の色を紡いでいます...</span>
                                <div className="w-48 h-1 bg-white/30 rounded-full overflow-hidden">
                                    <div className="h-full bg-white animate-progress"></div>
                                </div>
                            </div>
                        ) : (
                            <div className="text-white text-glow animate-in fade-in duration-1000">
                                <h2 className="text-4xl md:text-7xl font-bold mb-4 drop-shadow-lg">
                                    {history.length > 0 ? history[history.length - 1].word : "想いを描く空"}
                                </h2>
                                <p className="opacity-90 italic text-sm md:text-base tracking-widest">
                                    {history.length > 0 ? `${history.length}つの色彩が混ざり合う空` : "言葉を入力して、空に新しい色を灯しましょう"}
                                </p>
                            </div>
                        )}
                    </main>

                    {/* 入力フッター */}
                    <footer className="relative z-20 p-6 pb-12">
                        <form onSubmit={handleSubmit} className="max-w-xl mx-auto w-full relative">
                            <input 
                                type="text" 
                                value={inputText} 
                                onChange={(e) => setInputText(e.target.value)} 
                                placeholder="今の気分や好きな言葉を入力..." 
                                className="w-full px-6 py-4 pr-16 rounded-full bg-white/20 backdrop-blur-xl border border-white/40 text-white placeholder:text-white/60 focus:outline-none focus:ring-2 focus:ring-white/50 transition-all text-lg shadow-2xl" 
                                disabled={loading} 
                            />
                            <button type="submit" disabled={loading || !inputText.trim()} className="absolute right-2 top-2 w-12 h-12 flex items-center justify-center rounded-full bg-white text-slate-900 shadow-lg disabled:opacity-50 hover:scale-105 active:scale-95 transition-transform">
                                {loading ? <Icon name="Loader2" size={20} /> : <Icon name="Send" size={20} />}
                            </button>
                        </form>
                    </footer>

                    {/* パスワード認証モーダル */}
                    {passwordModal.isOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/60 backdrop-blur-md">
                            <div className="bg-white p-8 rounded-3xl w-full max-w-sm text-center shadow-2xl animate-in zoom-in-95 duration-200">
                                <h3 className="text-xl font-bold mb-4 text-slate-800 flex items-center justify-center gap-2">
                                    <Icon name="Lock" size={20} className="text-sky-500" />
                                    管理者認証
                                </h3>
                                <p className="text-slate-500 text-sm mb-6">
                                    {passwordModal.type === 'all' ? '履歴をすべてリセットしますか？' : 'この記録を削除しますか？'}
                                </p>
                                <input 
                                    type="password" 
                                    value={passwordInput} 
                                    onChange={(e) => setPasswordInput(e.target.value)} 
                                    className={`w-full border p-3 rounded-xl mb-4 text-center text-xl tracking-widest ${passwordError ? 'border-red-500 bg-red-50 animate-bounce' : 'border-slate-200 focus:border-sky-500 outline-none'}`} 
                                    placeholder="••••" 
                                    autoFocus
                                    onKeyDown={(e) => e.key === 'Enter' && handleAuth()}
                                />
                                {passwordError && <p className="text-red-500 text-xs mb-4">パスワードが正しくありません</p>}
                                <div className="space-y-2">
                                    <button onClick={handleAuth} className="w-full py-3 bg-slate-900 text-white rounded-xl font-bold hover:bg-slate-800 transition-colors">確認して実行</button>
                                    <button onClick={() => { setPasswordModal({ isOpen: false }); setPasswordInput(''); setPasswordError(false); }} className="w-full py-3 text-slate-400 text-sm hover:text-slate-600 transition-colors">キャンセル</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 履歴モーダル */}
                    {isHistoryOpen && (
                        <div className="fixed inset-0 z-50 flex items-end bg-black/40 backdrop-blur-sm transition-opacity">
                            <div className="w-full bg-white rounded-t-[40px] p-8 max-h-[85vh] flex flex-col shadow-2xl animate-in slide-in-from-bottom duration-300">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-2xl font-bold flex items-center gap-2 text-slate-800">
                                        <Icon name="History" size={24} className="text-sky-500" />
                                        空の記憶
                                    </h3>
                                    <button onClick={() => setIsHistoryOpen(false)} className="p-2 hover:bg-slate-100 rounded-full transition-colors"><Icon name="X" size={28} /></button>
                                </div>
                                <div className="space-y-3 overflow-y-auto flex-1 pr-2 no-scrollbar">
                                    {history.length === 0 ? (
                                        <div className="text-center py-20">
                                            <Icon name="Cloud" size={48} className="mx-auto text-slate-100 mb-4" />
                                            <p className="text-slate-400 italic">まだ空に色がありません</p>
                                        </div>
                                    ) : (
                                        [...history].reverse().map((item) => (
                                            <div key={item.id} className="flex items-center gap-4 p-4 rounded-2xl bg-slate-50 border border-slate-100 hover:border-sky-200 transition-colors group">
                                                <div className="w-12 h-12 rounded-xl shadow-inner flex-shrink-0 border border-black/5" style={{ backgroundColor: item.color }} />
                                                <div className="flex-1">
                                                    <div className="font-bold text-slate-700 text-lg">{item.word}</div>
                                                    <div className="text-[10px] text-slate-400 font-mono uppercase tracking-tighter">{item.color}</div>
                                                </div>
                                                <button onClick={() => setPasswordModal({ isOpen: true, targetId: item.id, type: 'single' })} className="p-2 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-lg transition-all opacity-0 group-hover:opacity-100 focus:opacity-100">
                                                    <Icon name="Trash2" size={20} />
                                                </button>
                                            </div>
                                        ))
                                    )}
                                </div>
                                <div className="mt-6 pt-4 border-t border-slate-100 text-center">
                                    <p className="text-[10px] text-slate-300 uppercase tracking-[0.2em]">One Sky Project History Management</p>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
